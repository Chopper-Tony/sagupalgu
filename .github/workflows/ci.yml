name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Settings 초기화에 필요한 최소 환경변수 (unit 테스트·type-sync용 더미값)
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-key' }}
  SECRET_ENCRYPTION_KEY: ${{ secrets.SECRET_ENCRYPTION_KEY || 'placeholder-encryption-key-32ch' }}
  PUBLISH_USE_QUEUE: "false"  # CI에서는 publish_jobs 테이블 없으므로 동기 모드

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest tests/ -m unit --tb=short -q

      - name: Run integration tests
        run: python -m pytest tests/ -m integration --tb=short -q
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}

      - name: Run full test suite with coverage
        run: python -m pytest tests/ --tb=short -q --cov=app --cov-report=term-missing --cov-report=html:coverage-report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 7

  type-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check API type sync
        run: python scripts/generate_api_types.py --check

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, type-sync, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t sagupalgu-backend .

      - name: Build frontend Docker image
        run: docker build -t sagupalgu-frontend ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Check deploy prerequisites
        id: check
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "EC2_HOST not configured — skipping deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to EC2
        if: steps.check.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/sagupalgu
            git pull origin main
            # Rolling restart: rebuild and restart backend first (Caddy keeps serving)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build backend frontend
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up --no-deps -d backend
            # Wait for backend health before restarting frontend
            echo "Waiting for backend health..."
            for i in $(seq 1 30); do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml exec -T backend curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Backend healthy after ${i}s"
                break
              fi
              sleep 1
            done
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up --no-deps -d frontend
            # Ensure Caddy picks up any config changes
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up --no-deps -d caddy
            echo "Deploy complete: $(date)"

      - name: Notify Discord on deploy
        if: always() && steps.check.outputs.skip != 'true'
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          [ "$STATUS" != "success" ] && EMOJI="❌"
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"$EMOJI 배포 $STATUS — $(git log -1 --pretty=%s)\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
