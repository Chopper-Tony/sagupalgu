name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Settings 초기화에 필요한 최소 환경변수 (unit 테스트·type-sync용 더미값)
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-key' }}
  SECRET_ENCRYPTION_KEY: ${{ secrets.SECRET_ENCRYPTION_KEY || 'placeholder-encryption-key-32ch' }}
  PUBLISH_USE_QUEUE: "false"  # CI에서는 publish_jobs 테이블 없으므로 동기 모드

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest tests/ -m unit --tb=short -q

      - name: Run integration tests
        run: python -m pytest tests/ -m integration --tb=short -q
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}

      - name: Run full test suite with coverage
        run: python -m pytest tests/ --tb=short -q --cov=app --cov-report=term-missing --cov-report=html:coverage-report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report/
          retention-days: 7

  type-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Check API type sync
        run: python scripts/generate_api_types.py --check

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Run frontend tests
        run: npm test
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, type-sync, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t sagupalgu-backend .

      - name: Build frontend Docker image
        run: docker build -t sagupalgu-frontend ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Check deploy prerequisites
        id: check
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "EC2_HOST not configured — skipping deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to EC2
        if: steps.check.outputs.skip != 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/sagupalgu
            git pull origin main

            # docker compose (v2 플러그인) 또는 docker-compose (v1 legacy) 자동 감지
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "ERROR: docker compose / docker-compose 둘 다 미설치" >&2
              exit 1
            fi
            echo "사용할 compose 명령: $DC"

            COMPOSE="$DC -f docker-compose.yml -f docker-compose.prod.yml"

            # 1) frontend/.env 자동 생성/갱신 — Vite는 frontend/ 하위의 .env만 읽음
            #    루트 .env의 VITE_* 를 항상 truth source로 덮어써 stale 파일 방지
            if grep -q '^VITE_SUPABASE_' .env 2>/dev/null; then
              grep -E '^VITE_SUPABASE_(URL|ANON_KEY)=' .env > frontend/.env
              echo "✓ frontend/.env 갱신됨 ($(wc -l < frontend/.env)줄)"
            fi

            # 2) VISION_PROVIDER 기본값 정합화 — 코드 default=gemini 를 덮어쓰지 않도록
            if grep -qE '^VISION_PROVIDER=openai$' .env 2>/dev/null; then
              sed -i 's/^VISION_PROVIDER=openai$/VISION_PROVIDER=gemini/' .env
              echo "✓ VISION_PROVIDER openai → gemini"
            fi

            # 3) 백엔드 롤링 재시작 (Caddy 서빙 유지)
            $COMPOSE build backend
            $COMPOSE up --no-deps -d --force-recreate backend

            echo "Waiting for backend health..."
            for i in $(seq 1 30); do
              if $COMPOSE exec -T backend curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "Backend healthy after ${i}s"
                break
              fi
              sleep 1
            done

            # 4) 프론트엔드 — 캐시 무효화 + 컨테이너 강제 재생성
            $COMPOSE build --no-cache frontend
            $COMPOSE up --no-deps -d --force-recreate frontend

            # 5) Caddy 설정 반영 — Caddyfile 은 볼륨 마운트라 이미지 변경이 없어도
            #    --force-recreate 로 컨테이너 재생성해야 config 재로드됨
            $COMPOSE up --no-deps -d --force-recreate caddy

            echo "Deploy complete: $(date)"

      - name: Notify Discord on deploy
        if: always() && steps.check.outputs.skip != 'true'
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          [ "$STATUS" != "success" ] && EMOJI="❌"
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"$EMOJI 배포 $STATUS — $(git log -1 --pretty=%s)\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
