name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Settings 초기화에 필요한 최소 환경변수 (unit 테스트·type-sync용 더미값)
  SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://placeholder.supabase.co' }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || 'placeholder-key' }}
  SECRET_ENCRYPTION_KEY: ${{ secrets.SECRET_ENCRYPTION_KEY || 'placeholder-encryption-key-32ch' }}

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: python -m pytest tests/ -m unit --tb=short -q

      - name: Run integration tests
        run: python -m pytest tests/ -m integration --tb=short -q
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}

      - name: Run full test suite
        run: python -m pytest tests/ --tb=short -q
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UPSTAGE_API_KEY: ${{ secrets.UPSTAGE_API_KEY }}

  type-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check API type sync
        run: python scripts/generate_api_types.py --check

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

  docker-build:
    runs-on: ubuntu-latest
    needs: [test, type-sync, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend Docker image
        run: docker build -t sagupalgu-backend .

      - name: Build frontend Docker image
        run: docker build -t sagupalgu-frontend ./frontend

  deploy:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/sagupalgu
            git pull origin main
            docker compose down
            docker compose up -d --build
            echo "Deploy complete: $(date)"

      - name: Notify Discord on deploy
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          [ "$STATUS" != "success" ] && EMOJI="❌"
          curl -s -H "Content-Type: application/json" \
            -d "{\"content\": \"$EMOJI 배포 $STATUS — $(git log -1 --pretty=%s)\"}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}" || true
