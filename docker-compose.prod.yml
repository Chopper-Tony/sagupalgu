# Production override — Caddy HTTPS 리버스 프록시
#
# 사용법:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# 필수 환경변수 (.env):
#   DOMAIN_NAME=sagupalgu.example.com
#
# Caddy가 Let's Encrypt 인증서를 자동 발급/갱신한다.
# DOMAIN_NAME 미설정 시 localhost fallback (HTTP only).

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # TLS certificates persist across redeploys
      - caddy_config:/config
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME:-localhost}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  backend:
    environment:
      - RUN_PUBLISH_WORKER=false  # API 전용 — 워커 미시작

  worker:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001
    environment:
      - RUN_PUBLISH_WORKER=true
      - PUBLISH_USE_QUEUE=true
      - MAX_CONCURRENT_BROWSERS=1  # 초기 안전값 (t3.small 2GB 기준)
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1536M  # Playwright 브라우저 + 앱 (OOM 방지)
    restart: unless-stopped

  frontend:
    ports: !reset []
    expose:
      - "80"
    depends_on:
      caddy:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
